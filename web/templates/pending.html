<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="refresh" content="5"/>
<title>⏳ Processing…</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#06060c;--card:#14141e;--rim:rgba(255,255,255,.07);--v:#7c3aed;--vl:#a78bfa;--ink:#e8e8f4;--dim:#7070a0;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--card);border:1px solid var(--rim);border-radius:16px;padding:44px 36px;text-align:center;max-width:380px;width:100%;box-shadow:0 28px 72px rgba(0,0,0,.7);}
.spin{font-size:48px;display:inline-block;animation:sp 2s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
h2{font-family:'Orbitron',sans-serif;font-size:17px;letter-spacing:1px;margin:18px 0 8px;}
p{color:var(--dim);font-size:13px;line-height:1.6;}
.fname{background:var(--bg);border:1px solid var(--rim);border-radius:8px;padding:8px 14px;margin:14px 0;font-size:12px;color:var(--vl);word-break:break-all;font-family:monospace;}
.note{font-size:11px;color:#4b5060;margin-top:10px;}
</style>
</head>
<body>
<div class="card">
  <div class="spin">⚙️</div>
  <h2>DOWNLOADING TO SERVER</h2>
  <p>Your file is being saved. This page refreshes every 5 seconds.</p>
  {% if file and file.file_name %}<div class="fname">{{ file.file_name }}</div>{% endif %}
  <p class="note">Large files may take a minute. Please wait.</p>
</div>
</body>
</html>
